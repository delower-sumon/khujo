# Nginx configuration for Khujo MVP
# Place this file in nginx/conf/nginx.conf or use as template

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

    server {
        listen 80;
        server_name localhost;

        # Serve static files from dist (built frontend)
        location / {
            root /path/to/your/project/dist;  # Replace with actual path
            index index.html index.htm;
            try_files $uri $uri/ /index.html;

            # Rate limit static files
            limit_req zone=static burst=20 nodelay;
        }

        # Proxy API requests to FastAPI backend
        location /api/ {
            proxy_pass http://localhost:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Rate limit API
            limit_req zone=api burst=5 nodelay;
        }

        # Optional: Proxy docs
        location /docs {
            proxy_pass http://localhost:8000/docs;
            proxy_set_header Host $host;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }
}